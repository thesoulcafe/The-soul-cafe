<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="The Soul Cafe in Tosh, Parvati Valley. Freshly prepared Himalayan delicacies, local trek guides, and a peaceful mountain vibe.">

    <meta property="og:description" content="Order fresh food and explore local treks in Tosh. Your soul's retreat in the Himalayas.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest-green: #1b4332;
            --wood-brown: #5d4037;
            --warm-cream: #fdf5e6;
            --accent-gold: #e6b17e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--warm-cream);
            color: #2d2d2d;
            scroll-behavior: smooth;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .dish-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-left: 4px solid #e6b17e;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .dish-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 0 2px #e6b17e, 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }

        /* Image Loading Protection */
        .img-fade {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        .img-loaded {
            opacity: 1;
        }

        .modal-backdrop { backdrop-filter: blur(8px); background-color: rgba(0, 0, 0, 0.6); }
        
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        .nav-active {
            color: white !important;
            background-color: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid var(--accent-gold);
        }
        
        #closed-banner {
            display: none;
            background: linear-gradient(90deg, #7f1d1d, #991b1b);
            color: white;
            text-align: center;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        #closed-banner.show { display: block; }
    </style>
</head>
<body class="selection:bg-[#1b4332] selection:text-white">

    <!-- Closed Banner -->
    <div id="closed-banner">
        🔴 &nbsp; We're currently closed. Come back soon — fresh food awaits! &nbsp; 🏔️
    </div>

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070'); filter: brightness(0.6);"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-2 tracking-tight drop-shadow-lg">The Soul Cafe</h1>
            <div class="flex items-center justify-center gap-2 text-white/90 text-lg md:text-xl font-medium italic">
                <i data-lucide="map-pin" class="w-5 h-5"></i>
                <span>Tosh, Himachal Pradesh</span>
            </div>
        </div>
    </header>

    <!-- Category Navigation -->
    <nav id="category-nav" class="sticky top-0 z-30 bg-[#1b4332] text-white shadow-md overflow-x-auto no-scrollbar">
        <div class="flex whitespace-nowrap px-4 py-3 gap-6 max-w-5xl mx-auto" id="nav-items"></div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12 pb-32">
        <div class="mb-12 text-center">
            <h2 class="text-3xl font-bold text-[#1b4332] mb-2">Our Menu</h2>
            <div class="mt-8 max-w-md mx-auto relative">

                <input type="text" id="menu-search" oninput="handleSearch()" placeholder="Search for food..." class="w-full pl-12 pr-4 py-3 rounded-2xl border-2 border-[#8b5e3c]/10 focus:border-[#1b4332] outline-none bg-white shadow-sm">
            </div>
        </div>

        <div id="menu-sections">
            <div id="skeleton-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="skeleton h-40 rounded-2xl"></div>
                <div class="skeleton h-40 rounded-2xl"></div>
                <div class="skeleton h-40 rounded-2xl"></div>
            </div>
        </div>

        <div id="trek-section" class="mt-20 scroll-mt-24">
            <h2 class="text-3xl font-bold text-[#1b4332] mb-8 text-center">Trek Guide</h2>
            <div id="trek-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

        <footer class="mt-20 text-center text-gray-500 text-sm italic border-t border-[#8b5e3c]/20 pt-8">
            <p>© The Soul Cafe, Tosh</p>
            <button onclick="openLoginModal()" class="mt-8 inline-flex items-center gap-2 px-4 py-2 rounded-full border border-[#1b4332]/20 text-[#1b4332] text-xs font-semibold opacity-30 hover:opacity-100 transition-all">
                <i data-lucide="lock" class="w-3 h-3"></i> Manager Login
            </button>

    </main>

    <!-- Floating Cart Button -->
    <button id="cart-btn" class="fixed bottom-8 right-8 z-40 bg-[#1b4332] text-white p-4 rounded-full shadow-2xl flex items-center gap-3 hidden">
        <i data-lucide="shopping-cart" class="w-6 h-6"></i>
        <span class="font-bold pr-2">Checkout (<span id="cart-total">₹0</span>)</span>
    </button>

    <!-- Manager Dashboard Modal -->
    <div id="manager-modal" class="fixed inset-0 z-[70] flex items-center justify-center p-0 sm:p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeManagerModal()"></div>
        <div class="relative w-full max-w-4xl bg-[#fdf5e6] h-full sm:h-[90vh] sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-[#1b4332] text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Manager Dashboard</h3>
                <button onclick="closeManagerModal()" class="p-2 hover:bg-white/10 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6">
                <!-- Add New Category -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#8b5e3c]/10 mb-8">
                    <h4 class="font-bold text-[#5d4037] mb-4 uppercase text-xs">Create New Category</h4>
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Starters)" class="flex-1 px-4 py-2 rounded-lg border">
                        <button onclick="addNewCategory()" class="bg-[#e6b17e] text-[#1b4332] px-6 py-2 rounded-lg font-bold">Create</button>
                    </div>
                </div>

                <!-- Add/Edit Dish Form -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#8b5e3c]/10 mb-8">
                    <h4 id="form-title" class="font-bold text-[#5d4037] mb-4 uppercase text-xs">Add New Dish</h4>
                    <input type="hidden" id="edit-item-index"><input type="hidden" id="edit-item-cat">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="new-item-name" placeholder="Dish Name" class="px-4 py-2 rounded-lg border">
                        <input type="number" id="new-item-price" placeholder="Price (₹)" class="px-4 py-2 rounded-lg border">
                        <select id="new-item-cat" class="px-4 py-2 rounded-lg border"></select>
                        <select id="new-item-veg" class="px-4 py-2 rounded-lg border">
                            <option value="true">Vegetarian 🟢</option>
                            <option value="false">Non-Vegetarian 🔴</option>
                        </select>
                        <input type="text" id="new-item-desc" placeholder="Description (Ingredients/Included items)" class="md:col-span-2 px-4 py-2 rounded-lg border">
                    </div>
                    <button id="submit-btn" onclick="addNewDish()" class="mt-4 bg-[#1b4332] text-white px-6 py-2 rounded-lg font-bold">Save Dish</button>
                </div>

                <div id="manager-items-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeLoginModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-3xl p-8">
            <h3 class="text-2xl font-bold text-[#1b4332] mb-6 text-center">Manager Login</h3>
            <input type="password" id="manager-password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border-2 mb-4 text-center">
            <button onclick="attemptLogin()" class="w-full bg-[#1b4332] text-white py-4 rounded-xl font-bold">Sign In</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { projectId: "gen-lang-client-0775483264", apiKey: "AIzaSyBkR2MeWHwOG55lb5TkEJSeFuPfF1ZL6Vk" };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true }, "ai-studio-4ce66396-f81d-4d93-944e-3f363b09c805");

        // UI Helpers
        const esc = (str) => str ? str.replace(/'/g, "\\'") : '';
        const show = (id) => document.getElementById(id).classList.remove('hidden');
        const hide = (id) => document.getElementById(id).classList.add('hidden');

        // Initial Data including items from images
        const DEFAULT_MENU = [
            { category: "Starters", items: [{ name: "Veg Pakora", price: 250, isVeg: true }] },
            { category: "Hot Beverages", items: [{ name: "Milk Tea", price: 50, isVeg: true }, { name: "Masala Tea", price: 60, isVeg: true }] },
            { 
                category: "Breakfast", 
                items: [
                    { name: "Indian breakfast", price: 300, isVeg: true, desc: "2 Aloo Prantha, Pickle, Curd, Tea/Coffee" },
                    { name: "Israeli breakfast", price: 350, isVeg: true, desc: "Shakshuka, Chips, Pita Bread, Tea/Coffee" },
                    { name: "Set breakfast", price: 320, isVeg: false, desc: "Fried Potato, Salad, butter jam toast, Omelette, Tea/Coffee" },
                    { name: "Continental breakfast", price: 320, isVeg: false, desc: "Omelette, butter toast, chips, Salad, Tea/Coffee" },
                    { name: "Special breakfast", price: 320, isVeg: true, desc: "Mushroom omelette, Cheese olive toast, salad, Tea/Coffee" }
                ] 
            },
            { 
                category: "Sandwich", 
                items: [
                    { name: "Veg. Cheese sandwich", price: 200, isVeg: true },
                    { name: "Cheese tomato sandwich", price: 180, isVeg: true },
                    { name: "Cheese mushroom olive sandwich", price: 250, isVeg: true },
                    { name: "Egg sandwich", price: 240, isVeg: false },
                    { name: "Club sandwich", price: 250, isVeg: true }
                ] 
            },
            { 
                category: "Maggi", 
                items: [
                    { name: "Plain Maggi", price: 60, isVeg: true },
                    { name: "Plain cheese Maggi", price: 100, isVeg: true },
                    { name: "Veg. Maggi", price: 80, isVeg: true },
                    { name: "Veg. Cheese Maggi", price: 120, isVeg: true },
                    { name: "Egg Maggi", price: 120, isVeg: false },
                    { name: "Egg cheese Maggi", price: 150, isVeg: false }
                ] 
            },
            {
                category: "Shakes",
                items: [
                    { name: "Banana shake", price: 120, isVeg: true },
                    { name: "Mango shake", price: 150, isVeg: true },
                    { name: "Chocolate shake", price: 150, isVeg: true },
                    { name: "Nutella shake", price: 180, isVeg: true },
                    { name: "Strawberry shake", price: 150, isVeg: true },
                    { name: "Oreo shake", price: 150, isVeg: true },
                    { name: "Peanut butter honey shake", price: 150, isVeg: true },
                    { name: "Cold coffee", price: 150, isVeg: true },
                    { name: "Kaju Badam shake", price: 220, isVeg: true },
                    { name: "Strawberry Slush", price: 150, isVeg: true }
                ]
            },
            {
                category: "Fresh juice",
                items: [
                    { name: "Mango juice", price: 150, isVeg: true },
                    { name: "Orange juice", price: 150, isVeg: true },
                    { name: "Lemonana", price: 150, isVeg: true },
                    { name: "Papaya juice", price: 150, isVeg: true },
                    { name: "Watermelon juice", price: 150, isVeg: true },
                    { name: "Lemon juice", price: 80, isVeg: true },
                    { name: "Pineapple juice", price: 150, isVeg: true },
                    { name: "Pomegranate juice", price: 150, isVeg: true },
                    { name: "Mix fruit juice", price: 180, isVeg: true }
                ]
            }
        ];

        let MENU_DATA = [];
        let TREK_DATA = [];
        let isManager = false;

        async function init() {
            onSnapshot(collection(db, "menu"), (snap) => {
                if (snap.empty) migrateMenu();
                MENU_DATA = snap.docs.map(d => d.data()).sort((a,b) => a.order - b.order);
                renderNav();
                renderMenu();
                updateCatDropdown();
                if (isManager) renderManagerItems();
            });

            onSnapshot(collection(db, "treks"), (snap) => {
                TREK_DATA = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTreks();
            });

            lucide.createIcons();
        }

        async function migrateMenu() {
            const batch = writeBatch(db);
            DEFAULT_MENU.forEach((cat, i) => {
                batch.set(doc(db, "menu", cat.category), { ...cat, order: i });
            });
            await batch.commit();
        }

        // Customer Rendering
        function renderMenu(query = '') {
            const container = document.getElementById('menu-sections');
            container.innerHTML = '';
            document.getElementById('skeleton-container')?.classList.add('hidden');

            MENU_DATA.forEach(section => {
                // DON'T SHOW UNAVAILABLE ITEMS TO CUSTOMERS
                const visibleItems = section.items.filter(item => {
                    const matchesQuery = item.name.toLowerCase().includes(query.toLowerCase());
                    return matchesQuery && !item.unavailable;
                });

                if (visibleItems.length === 0) return;

                const sec = document.createElement('section');
                sec.id = `section-${section.category.replace(/\s+/g, '-')}`;
                sec.className = "mb-12 menu-section";
                sec.innerHTML = `
                    <h3 class="text-2xl font-bold text-[#5d4037] mb-6 flex items-center gap-3">
                        ${section.category} <div class="h-px bg-[#8b5e3c]/20 flex-1"></div>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${visibleItems.map(item => renderDishCard(item, section.category)).join('')}
                    </div>
                `;
                container.appendChild(sec);
            });
            lucide.createIcons();
        }

        function renderDishCard(item, cat) {
            return `
                <div class="dish-card p-6 flex flex-col justify-between" style="--card-bg: white">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold px-2 py-1 rounded bg-gray-100">${item.isVeg ? '🟢 VEG' : '🔴 NON-VEG'}</span>
                            <span class="font-black text-[#1b4332]">₹${item.price}</span>
                        </div>
                        <h4 class="text-lg font-bold text-[#2d2d2d] mb-1">${item.name}</h4>
                        ${item.desc ? `<p class="text-xs text-gray-500 italic mb-4">${item.desc}</p>` : ''}
                    </div>
                    <button onclick="addToWhatsApp('${esc(item.name)}', ${item.price})" class="w-full py-2 bg-[#1b4332] text-white rounded-xl text-xs font-bold hover:bg-[#25D366] transition-all">ORDER NOW</button>
                </div>
            `;
        }

        window.addToWhatsApp = (name, price) => {
            const msg = `Hi! I'd like to order: ${name} (₹${price}).`;
            window.open(`https://wa.me/917023207620?text=${encodeURIComponent(msg)}`);
        };

        // Image Handling Logic (Used in Trek section)
        function renderTreks() {
            const container = document.getElementById('trek-list');
            container.innerHTML = TREK_DATA.map(trek => `
                <div class="dish-card bg-white overflow-hidden">
                    <div class="relative h-48 bg-gray-100">
                        <!-- PROTECT AGAINST HALF LOADED IMAGES -->
                        <img src="${trek.image}" 
                             class="img-fade w-full h-full object-cover" 
                             onload="this.classList.add('img-loaded')"
                             loading="lazy">
                    </div>
                    <div class="p-6">
                        <h4 class="font-bold text-lg">${trek.name}</h4>
                        <p class="text-sm text-gray-600 my-2 line-clamp-2">${trek.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-bold text-[#1b4332] uppercase">${trek.difficulty}</span>
                            <button class="text-xs font-bold text-[#e6b17e]">VIEW DETAILS</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Manager Controls
        window.addNewCategory = async () => {
            const name = document.getElementById('new-cat-name').value.trim();
            if (!name) return;
            await setDoc(doc(db, "menu", name), { category: name, items: [], order: MENU_DATA.length });
            document.getElementById('new-cat-name').value = '';
            alert("Category created!");
        };

        window.addNewDish = async () => {
            const name = document.getElementById('new-item-name').value;
            const price = parseInt(document.getElementById('new-item-price').value);
            const catName = document.getElementById('new-item-cat').value;
            const desc = document.getElementById('new-item-desc').value;
            const isVeg = document.getElementById('new-item-veg').value === "true";

            const cat = MENU_DATA.find(c => c.category === catName);
            cat.items.push({ name, price, desc, isVeg, unavailable: false });
            await setDoc(doc(db, "menu", catName), cat);
            alert("Dish added!");
        };

        window.toggleAvailability = async (catName, idx) => {
            const cat = MENU_DATA.find(c => c.category === catName);
            cat.items[idx].unavailable = !cat.items[idx].unavailable;
            await setDoc(doc(db, "menu", catName), cat);
        };

        function renderManagerItems() {
            const container = document.getElementById('manager-items-list');
            container.innerHTML = MENU_DATA.map(cat => `
                <div class="bg-white p-4 rounded-xl border mb-4">
                    <div class="flex justify-between mb-4">
                        <h5 class="font-bold">${cat.category}</h5>
                        <button onclick="deleteCat('${esc(cat.category)}')" class="text-red-500 text-xs">Delete Cat</button>
                    </div>
                    ${cat.items.map((item, i) => `
                        <div class="flex items-center justify-between py-2 border-t text-sm">
                            <span class="${item.unavailable ? 'opacity-30 line-through' : ''}">${item.name}</span>
                            <div class="flex gap-2">
                                <button onclick="toggleAvailability('${esc(cat.category)}', ${i})" class="px-2 py-1 bg-gray-100 rounded">${item.unavailable ? 'Show' : 'Hide'}</button>
                                <button onclick="deleteDish('${esc(cat.category)}', ${i})" class="text-red-400">Remove</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        window.deleteDish = async (catName, idx) => {
            if(!confirm("Remove?")) return;
            const cat = MENU_DATA.find(c => c.category === catName);
            cat.items.splice(idx, 1);
            await setDoc(doc(db, "menu", catName), cat);
        };

        function updateCatDropdown() {
            const sel = document.getElementById('new-item-cat');
            if(sel) sel.innerHTML = MENU_DATA.map(c => `<option value="${c.category}">${c.category}</option>`).join('');
        }

        // Auth
        window.attemptLogin = () => {
            if (document.getElementById('manager-password').value === "SoulCafeTosh") {
                isManager = true;
                hide('login-modal');
                show('manager-modal');
                renderManagerItems();
            } else {
                alert("Wrong password");
            }
        };

        window.openLoginModal = () => isManager ? show('manager-modal') : show('login-modal');
        window.closeLoginModal = () => hide('login-modal');
        window.closeManagerModal = () => hide('manager-modal');

        function renderNav() {
            const nav = document.getElementById('nav-items');
            nav.innerHTML = MENU_DATA.map(cat => `
                <button onclick="document.getElementById('section-${cat.category.replace(/\s+/g, '-')}').scrollIntoView({behavior:'smooth'})" class="text-xs font-bold uppercase">${cat.category}</button>
            `).join('') + `<button onclick="document.getElementById('trek-section').scrollIntoView({behavior:'smooth'})" class="text-xs font-bold uppercase">TREKS</button>`;
        }

        window.handleSearch = () => renderMenu(document.getElementById('menu-search').value);

        init();
    </script>
</body>
</html>
